name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip the auto-opened release PR — its commits are authored by
    # github-actions[bot] (changesets/action) and don't carry DCO trailers.
    if: ${{ github.head_ref != 'changeset-release/main' }}
    steps:
      - name: Checkout
        # pin: actions/checkout v4.1.7
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Validate DCO sign-off on every commit
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          if [[ -z "$base_sha" || -z "$head_sha" ]]; then
            echo "::error::Missing base/head SHA for PR — cannot validate DCO"
            exit 1
          fi

          echo "Checking DCO sign-off on commits in range ${base_sha}..${head_sha}"

          missing=()
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            author="$(git log -1 --format=%an "$sha")"
            email="$(git log -1 --format=%ae "$sha")"
            # Skip commits authored by GitHub Actions bots (changesets/action,
            # dependabot, etc.) — they cannot sign with a real human DCO.
            if [[ "$author" == *"[bot]" || "$email" == *"@users.noreply.github.com" ]]; then
              echo "  $sha  skipped (bot author: $author <$email>)"
              continue
            fi
            msg="$(git log -1 --format=%B "$sha")"
            if ! grep -qE '^Signed-off-by: .+ <.+@.+>$' <<<"$msg"; then
              missing+=("$sha")
            fi
          done < <(git log --format=%H "${base_sha}..${head_sha}")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::The following commits are missing a DCO Signed-off-by trailer:"
            for sha in "${missing[@]}"; do
              subject="$(git log -1 --format=%s "$sha")"
              echo "::error::  $sha  $subject"
            done
            echo ""
            echo "Fix: rebase and re-sign with: git commit --amend -s  (or  git rebase --signoff)"
            echo "See: https://developercertificate.org/"
            exit 1
          fi

          echo "All commits signed off. DCO OK."
